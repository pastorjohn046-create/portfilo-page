[build]
  command = "npm run build"
  publish = "dist"

# Handle Multi-Page Application routing
[[redirects]]
  from = "/projects"
  to = "/projects/index.html"
  status = 200

[[redirects]]
  from = "/experience"
  to = "/experience/index.html"
  status = 200

# Fallback to 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
